<!-- SaaS Landing Page Meta Template -->
<title><Primary Keyword>: <Value Prop> | <Brand></title>
<meta name="description" content="<Hook>. <Main benefit>. <CTA>. Start free trial today.">
<link rel="canonical" href="https://example.com/<path>">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://example.com/<path>">
<meta property="og:title" content="<Brand>: <Value Prop>">
<meta property="og:description" content="<Hook>. <Main benefit>. Try it free.">
<meta property="og:image" content="https://example.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="<Brand>">
<meta property="og:locale" content="en_US">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@<brand>">
<meta name="twitter:creator" content="@<author>">
<meta name="twitter:title" content="<Brand>: <Value Prop>">
<meta name="twitter:description" content="<Hook>. <Main benefit>.">
<meta name="twitter:image" content="https://example.com/twitter-card.png">

<!-- Robots & verification -->
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1">
