<!-- E-commerce Product Meta Template -->
<title><Product Name> - <Key Feature> | <Brand></title>
<meta name="description" content="Buy <Product Name>. <Main benefit>. <Trust signal: free shipping/returns>. From €<price>.">
<link rel="canonical" href="https://example.com/products/<slug>">

<!-- Open Graph (product) -->
<meta property="og:type" content="product">
<meta property="og:url" content="https://example.com/products/<slug>">
<meta property="og:title" content="<Product Name> | <Brand>">
<meta property="og:description" content="<Product short description>">
<meta property="og:image" content="https://example.com/products/<slug>/cover-1200x630.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:availability" content="instock">
<meta property="product:price:amount" content="29.99">
<meta property="product:price:currency" content="EUR">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="<Product Name>">
<meta name="twitter:description" content="<Product short description>">
<meta name="twitter:image" content="https://example.com/products/<slug>/cover.jpg">
<meta name="twitter:label1" content="Price">
<meta name="twitter:data1" content="€29.99">
<meta name="twitter:label2" content="Availability">
<meta name="twitter:data2" content="In stock">
