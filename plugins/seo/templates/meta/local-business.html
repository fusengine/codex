<!-- Local Business Meta Template -->
<title><Business Name> - <Service> in <City> | <Brand></title>
<meta name="description" content="<Business Name> offers <main service> in <City>. <USP>. Call <phone> or book online today.">
<link rel="canonical" href="https://example.com/<city>/<service>">

<!-- Open Graph -->
<meta property="og:type" content="business.business">
<meta property="og:url" content="https://example.com/<city>/<service>">
<meta property="og:title" content="<Business Name> | <Service> in <City>">
<meta property="og:description" content="<USP>. <CTA>.">
<meta property="og:image" content="https://example.com/<city>/storefront-1200x630.jpg">
<meta property="og:locale" content="fr_CH">
<meta property="business:contact_data:street_address" content="Rue du Commerce 12">
<meta property="business:contact_data:locality" content="Genève">
<meta property="business:contact_data:postal_code" content="1204">
<meta property="business:contact_data:country_name" content="Switzerland">

<!-- Geo meta -->
<meta name="geo.region" content="CH-GE">
<meta name="geo.placename" content="Genève">
<meta name="geo.position" content="46.2044;6.1432">
<meta name="ICBM" content="46.2044, 6.1432">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="<Business Name> | <City>">
<meta name="twitter:description" content="<USP>">
<meta name="twitter:image" content="https://example.com/<city>/storefront.jpg">
