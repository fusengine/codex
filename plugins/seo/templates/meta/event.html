<!-- Event Page Meta Template -->
<title><Event Name> - <Date> in <City> | <Brand></title>
<meta name="description" content="Join <Event Name> on <date> in <City>. <USP>. Reserve your seat now.">
<link rel="canonical" href="https://example.com/events/<slug>">

<!-- Open Graph (event) -->
<meta property="og:type" content="event">
<meta property="og:url" content="https://example.com/events/<slug>">
<meta property="og:title" content="<Event Name> | <Date>">
<meta property="og:description" content="<USP>. <CTA>.">
<meta property="og:image" content="https://example.com/events/<slug>/cover.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="event:start_time" content="2026-06-15T19:00:00+02:00">
<meta property="event:end_time" content="2026-06-15T22:00:00+02:00">
<meta property="event:location:latitude" content="46.2044">
<meta property="event:location:longitude" content="6.1432">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="<Event Name>">
<meta name="twitter:description" content="<USP>. <CTA>">
<meta name="twitter:image" content="https://example.com/events/<slug>/cover.jpg">
