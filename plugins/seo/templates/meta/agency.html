<!-- Agency / Services Meta Template -->
<title><Service> Agency in <City> | <Brand></title>
<meta name="description" content="<Brand> is a <service> agency specialized in <niche>. <USP>. Get a free quote today.">
<link rel="canonical" href="https://example.com/<service>">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://example.com/<service>">
<meta property="og:title" content="<Brand> | <Service> Experts">
<meta property="og:description" content="<USP>. Trusted by <N>+ companies.">
<meta property="og:image" content="https://example.com/agency-og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="<Brand>">
<meta property="og:locale" content="en_US">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@<brand>">
<meta name="twitter:title" content="<Brand> | <Service>">
<meta name="twitter:description" content="<USP>">
<meta name="twitter:image" content="https://example.com/agency-twitter.png">
