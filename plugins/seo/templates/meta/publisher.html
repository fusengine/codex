<!-- Publisher / News Meta Template -->
<title><Headline> - <Section> | <Publication></title>
<meta name="description" content="<Lead 120-155 chars>">
<link rel="canonical" href="https://example.com/<section>/<slug>">

<!-- Open Graph (article) -->
<meta property="og:type" content="article">
<meta property="og:url" content="https://example.com/<section>/<slug>">
<meta property="og:title" content="<Headline>">
<meta property="og:description" content="<Lead>">
<meta property="og:image" content="https://example.com/news/<slug>/cover.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="<Publication>">

<!-- Article specifics -->
<meta property="article:published_time" content="2026-05-12T08:00:00+00:00">
<meta property="article:modified_time" content="2026-05-12T10:00:00+00:00">
<meta property="article:author" content="https://example.com/authors/<slug>">
<meta property="article:section" content="<Section>">
<meta property="article:tag" content="<tag>">

<!-- Standout / Google News -->
<meta name="news_keywords" content="<keyword1>, <keyword2>, <keyword3>">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@<publication>">
<meta name="twitter:creator" content="@<author>">
<meta name="twitter:title" content="<Headline>">
<meta name="twitter:description" content="<Lead>">
<meta name="twitter:image" content="https://example.com/news/<slug>/cover.jpg">
