<!-- Blog Post Meta Template -->
<title><Article Title 50-60 chars> | <Blog Name></title>
<meta name="description" content="<Hook 120-155 chars>. Discover key insights and actionable tips.">
<link rel="canonical" href="https://example.com/blog/<slug>">

<!-- Open Graph (article) -->
<meta property="og:type" content="article">
<meta property="og:url" content="https://example.com/blog/<slug>">
<meta property="og:title" content="<Article Title>">
<meta property="og:description" content="<Hook>">
<meta property="og:image" content="https://example.com/blog/<slug>/cover.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="<Blog Name>">
<meta property="og:locale" content="en_US">
<meta property="article:published_time" content="2026-05-01T08:00:00+00:00">
<meta property="article:modified_time" content="2026-05-12T10:00:00+00:00">
<meta property="article:author" content="https://example.com/authors/<slug>">
<meta property="article:section" content="<Category>">
<meta property="article:tag" content="<tag1>">
<meta property="article:tag" content="<tag2>">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@<brand>">
<meta name="twitter:creator" content="@<author>">
<meta name="twitter:title" content="<Article Title>">
<meta name="twitter:description" content="<Hook>">
<meta name="twitter:image" content="https://example.com/blog/<slug>/cover.png">
